services:
  - type: web
    name: portfolio-ai
    runtime: python
    rootDir: rag_prod
    buildCommand: "./build.sh"
    startCommand: "gunicorn rag_prod.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: WEB_CONCURRENCY
        value: "2"
